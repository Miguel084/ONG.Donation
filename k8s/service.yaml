---
apiVersion: v1
kind: Service
metadata:
  name: ong-donation-webapi
  namespace: ong-donation
  labels:
    app: ong-donation-webapi
    app.kubernetes.io/name: ong-donation-webapi
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: ong-donation-platform
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    description: "ONG Donation WebAPI Service"
spec:
  type: ClusterIP
  selector:
    app: ong-donation-webapi
    component: api
  sessionAffinity: None
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
  
  # Session affinity (optional)
  # sessionAffinityConfig:
  #   clientIP:
  #     timeoutSeconds: 10800

---
apiVersion: v1
kind: Service
metadata:
  name: ong-donation-webapi-headless
  namespace: ong-donation
  labels:
    app: ong-donation-webapi
    app.kubernetes.io/name: ong-donation-webapi
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: ong-donation-webapi
    component: api
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
