---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ong-donation-webapi-hpa
  namespace: ong-donation
  labels:
    app: ong-donation-webapi
    app.kubernetes.io/name: ong-donation-webapi
    app.kubernetes.io/component: autoscaler
    app.kubernetes.io/part-of: ong-donation-platform
  annotations:
    description: "Horizontal Pod Autoscaler for ONG Donation WebAPI"
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ong-donation-webapi
  
  minReplicas: 2
  maxReplicas: 10
  
  metrics:
  # CPU metric
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  
  # Memory metric
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  
  # Custom metric example (requires Prometheus)
  # - type: Pods
  #   pods:
  #     metric:
  #       name: http_request_duration_seconds
  #     target:
  #       type: AverageValue
  #       averageValue: "1"
  
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
      - type: Pods
        value: 1
        periodSeconds: 60
      selectPolicy: Min
    
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 2
        periodSeconds: 30
      selectPolicy: Max
