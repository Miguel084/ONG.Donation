---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ong-donation-webapi-network-policy
  namespace: ong-donation
  labels:
    app: ong-donation-webapi
spec:
  podSelector:
    matchLabels:
      app: ong-donation-webapi
  policyTypes:
  - Ingress
  - Egress
  
  # Ingress rules
  ingress:
  # Allow from any (nginx-ingress, monitoring, etc.)
  - ports:
    - protocol: TCP
      port: 8080
  
  # Egress rules - allow all (SQL, Key Vault, Service Bus are external)
  egress:
  - {}

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ong-donation-webapi-ingress
  namespace: ong-donation
  labels:
    app: ong-donation-webapi
    app.kubernetes.io/name: ong-donation-webapi
    app.kubernetes.io/component: ingress
    app.kubernetes.io/part-of: ong-donation-platform
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    nginx.ingress.kubernetes.io/rate-limit-status-code: "429"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/enable-modsecurity: "true"
    nginx.ingress.kubernetes.io/enable-owasp-core-rules: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - donation.ong.com
    - api.donation.ong.com
    - www.donation.ong.com
    secretName: ong-donation-tls
  
  rules:
  # Main API endpoint
  - host: api.donation.ong.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ong-donation-webapi
            port:
              number: 80
  
  # Health check endpoint
  - host: api.donation.ong.com
    http:
      paths:
      - path: /health
        pathType: Prefix
        backend:
          service:
            name: ong-donation-webapi
            port:
              number: 80
  
  # Public transparency endpoint
  - host: donation.ong.com
    http:
      paths:
      - path: /api/public/campaigns
        pathType: Prefix
        backend:
          service:
            name: ong-donation-webapi
            port:
              number: 80
      - path: /health
        pathType: Prefix
        backend:
          service:
            name: ong-donation-webapi
            port:
              number: 80
  
  # www subdomain
  - host: www.donation.ong.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ong-donation-webapi
            port:
              number: 80
